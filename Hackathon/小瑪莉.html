      background-attachment: fixed;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }

    [box-id] {
      height: 66px;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: .3s;
      border: 1px solid white;
    }

    [box-id].active {
      border: 2px solid gold;
      box-shadow: 0 0 20px gold;
      transition: 0s;
    }

    a {
      text-decoration: none;
    }

    button {
      background-color: rgba(0, 0, 0, .2);
    }
    .select:hover {
      transform: scale(.99);
      transition: .5s;
    }
    .pay:hover,
    .start:hover,
    .cancel:hover {
      transform: scale(1.1);
      transition: .5s;
    }
  </style>

  <script>
    // 宣告
    let step = 0
    let allSteps = 0
    let current = 0
    let speed = 0
    // DOM
    let selects = document.querySelectorAll('.select')
    let pays = document.querySelectorAll('.pay')
    let bricks = document.querySelectorAll('[box-id]')
    const start = document.querySelector('.start')
    const cancel = document.querySelector('.cancel')
    // console.log(bricks)
    // window.onload
    window.onload = function(){
      setBricks()

      start.onclick = function(){
        let random = Math.floor(Math.random()*bricks.length)+1
        speed = 5

        steps = random + (5*bricks.length)
        allSteps = steps

        turnAround()
      }
    }
    // function
    selects.forEach(select =>
      select.addEventListener('mouseup', function () {
        select.classList.toggle('border-warning')
      })
    )
    pays.forEach(pay =>
      pay.addEventListener('mousedown', function () {
        pay.classList.toggle('text-warning')

      })
    )
    cancel.addEventListener('click', function () {
      window.location.reload()
    })

    function setBricks() {
      bricks = Array.from(bricks).sort((a, b) => {
        return a.getAttributeNode('box-id').value - b.getAttributeNode('box-id').value
      })
    }
    function turnAround(){
        bricks[current].classList.remove('active')
        current++

        if(current >= bricks.length) current = 0

        bricks[current].classList.add('active')
        {
          steps--
        }

        if(steps>0){
            setTimeout(turnAround,speed)

            if(steps<Math.floor((allSteps/5)))
            {
              speed+=5
            }
        }
      }
  </script>
