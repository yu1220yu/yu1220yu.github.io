<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            background-color: rgba(0,0,0,.05);
            margin: auto;
        }

        body {
            padding-top: 89px;
        }

        header {
            width: 100%;
            background-color: #ee4d2d;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 88px;
            z-index: 10;
        }

        .logo {
            margin: auto;
            width: 95%;
        }
        .logo nav {
            font-size: 1px;
            padding: 2px;
            margin: 2px;
            text-align: right;
        }
        nav ul a {
            color: white;
            text-decoration: none;
            display: inline;
        }
        nav ul a:hover {
            opacity: 0.5;
        }
        ul .create::after {
            content: '';
            opacity: .3;
            border-right: 1px solid;
            padding-left: 8px;
        }
        .logo a img {
            width: 168px;
            height: 85px;
            position: relative;
            bottom: 1.5em;
        }

        main{
            width: 1200px;
            margin: auto;
        }
        .main{
            margin: 10px;
        }

        .title,
        .content{
            background-color: #fff;
            min-width: 1200px;
            padding: 10px;
        }
        .title a {
            text-decoration: none;
        }
        .title a img {
            width: 68px;
            position: relative;
            top: 6px;
        }
        .title a.shop::after {
            content: '';
            opacity: .3;
            border-right: .8px solid;
        }
        .title b {
            margin-left: 11px;
        }
        .title p {
            font-size: 5px;
            display: inline;
            margin-left: 2px;
        }
        .title p img {
            width: 15px;
            position: relative;
            top: 4px;
            left: 4px;
        }
        .more {
            display: inline;
            float: right;
        }
        .more p {
            color: #ee4d2d;
            position: relative;
            left: 5px;
            opacity: .8;
        }
        .more a img {
            width: 20px;
            border-radius: 100%;
        }

        .content{
            border-top: 1px solid rgba(0,0,0,.05);
            margin: auto;
            display: flex;
            width: 1200px;
        }
        .content .ad img{
            width: 500px;
            height: 500px;
            border-radius: 2em;
            opacity: .9;
        }
        .content .product{
            width: 700px;
            margin: auto;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
        }
        .item{
            width: 155px;
            display: block;
            padding: 5px;
            margin: 5px;
        }
        .item img{
            width: 100%;
        }
        .item p{
            position: relative;
            bottom: 20px;
            font-size: 15px;
        }
        #red.item:hover{
            color: red;
        }
        #pink.item:hover{
            color: pink;
        }
        #green.item:hover{
            color: green;
        }
        #blue.item:hover{
            color: blue;
        }
        #white.item:hover{
            color: whitesmoke;
        }
        #black.item:hover{
            color: darkblue;
        }
        #purple.item:hover{
            color: purple;
        }
        #gray.item:hover{
            color: gray;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <nav>
                <ul>
                    <a href="#" class="create">註冊</a>
                    <a href="#" class="login">登入</a>
                </ul>
            </nav>
            <a href="#">
                <img src="logo.svg" alt="logo">
            </a>
        </div>
    </header>

    <main>
        <div class="main">
            <nav class="title">
                <a href="#" class="shop">
                    <img src="shop.svg" alt="shop">
                </a>
                <b>
                    <p>
                        <img src="button_1.svg" alt="button1">
                        15天鑑賞期
                    </p>
                    <p>
                        <img src="button_2.svg" alt="button2">
                        蝦皮安心退
                    </p>
                    <p>
                        <img src="button_3.svg" alt="button3">
                        正品保障
                    </p>
                </b>
                <div class="more">
                    <a href="#">
                        <b>
                            <p>查看全部</p>
                            <img src="more.svg" alt="more">
                        </b>
                    </a>
                </div>
            </nav>
            <nav class="content">
                <div class="ad">
                    <a href="#">
                        <img src="ad.svg" alt="ad">
                    </a>
                </div>
                <div class="product">
                    <div class="item" id="red">
                        <a href="">
                            <img src="red.svg" alt="red">
                        </a>
                        <p>RED</p>
                    </div>
                    <div class="item" id="pink">
                        <a href="">
                            <img src="pink.svg" alt="pink">
                        </a>
                        <p>PINK</p>
                    </div>
                    <div class="item" id="green">
                        <a href="">
                            <img src="green.svg" alt="green">
                        </a>
                        <p>GREEN</p>
                    </div>
                    <div class="item" id="blue">
                        <a href="">
                            <img src="blue.svg" alt="blue">
                        </a>
                        <p>BLUE</p>
                    </div>
                    <div class="item" id="white">
                        <a href="">
                            <img src="white.svg" alt="white">
                        </a>
                        <p>WHITE</p>
                    </div>
                    <div class="item" id="black">
                        <a href="">
                            <img src="black.svg" alt="black">
                        </a>
                        <p>BLACK</p>
                    </div>
                    <div class="item" id="purple">
                        <a href="">
                            <img src="purple.svg" alt="purple">
                        </a>
                        <p>PURPLE</p>
                    </div>
                    <div class="item" id="gray">
                        <a href="">
                            <img src="gray.svg" alt="gray">
                        </a>
                        <p>GRAY</p>
                    </div>
                </div>
            </nav>
        </div>
    </main>

    <footer></footer>
</body>

</html>
